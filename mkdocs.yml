site_name: DL Notes
site_url: https://XPengZhao.github.io/dl-note/
theme:
  name: material
plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            Hardware: 硬件
            Tensor Operation: 张量操作
            Neural Graphics: 神经图形
            AI Infra: AI Infra
            Overview: 总览
            Request Lifecycle: 请求生命周期
            Metrics: 指标
            KV Cache: KV Cache
            Serving Runtime: 推理运行时
            Parallelism: 并行策略
            Decoding: 解码与采样
            Training Objective: 训练目标
            Models: 模型
nav:
  - Home: index.md
  - Hardware: hardware.md
  - Tensor Operation: tensor.md
  - Neural Graphics: neural-graphics.md
  - AI Infra:
      - Overview: llms/overview.md
      - Request Lifecycle: llms/request-lifecycle.md
      - Metrics: llms/metrics.md
      - KV Cache: llms/kv-cache.md
      - Serving Runtime: llms/serving-runtime.md
      - Parallelism: llms/parallelism.md
      - Decoding: llms/decoding.md
      - Training Objective: llms/training-objective.md
  - Models: llms/models.md
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.arithmatex:
      generic: true
extra_css:
  - stylesheets/bootstrap.min.css
  - stylesheets/basic.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
